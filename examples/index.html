<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@russian-flags/samara-oblast example</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="eyebrow">пример npm-пакета</p>
          <h1>Флаги Самарской области</h1>
        </div>
        <p id="summary" class="summary">Загрузка...</p>
      </header>

      <section class="table-wrap" aria-label="Список городов">
        <table>
          <thead>
            <tr>
              <th>Город</th>
              <th>Идентификатор</th>
              <th>Флаг</th>
              <th>Формат флага</th>
            </tr>
          </thead>
          <tbody id="flagsList">
            <tr>
              <td colspan="4" class="loading">Загрузка списка...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <dialog id="flagModal" class="flag-modal" aria-labelledby="flagModalTitle">
      <div class="flag-modal__top">
        <h2 id="flagModalTitle"></h2>
        <button class="flag-modal__close" type="button" aria-label="Закрыть">×</button>
      </div>
      <div class="flag-modal__image-frame">
        <img id="flagModalImage" alt="" />
      </div>
    </dialog>
  </body>
</html>
